<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders — CT Artisanal Pantry Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../assets/logo/ct-monogram.png">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../site.css">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="brand">CT Admin</div>
    <nav>
      <a href="orders.html" class="active">Orders</a>
      <a href="products.html">Products</a>
    </nav>
    <div style="font-size:13px; color: var(--ink-300);">Logged in as <span data-admin-username>…</span></div>
    <button class="admin-logout" data-admin-logout>Log Out</button>
  </aside>

  <main class="admin-main">
    <h1 style="font: var(--text-h1); margin: 0 0 var(--space-6);">Orders</h1>

    <div id="orders-error" class="alert alert-error" style="display:none;"></div>

    <table class="admin-table">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Date</th>
          <th>Customer</th>
          <th>Payment</th>
          <th>Total</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="6" style="color: var(--text-muted);">Loading…</td></tr>
      </tbody>
    </table>

    <div id="order-detail-backdrop" style="display:none; position:fixed; inset:0; background:rgba(32,28,26,0.5); z-index:200; align-items:center; justify-content:center;">
      <div class="card card-elevated" style="max-width:520px; width:90%; max-height:80vh; overflow:auto; background:var(--surface-card);">
        <div id="order-detail-content"></div>
        <button class="btn btn-outline" id="order-detail-close" style="margin-top: var(--space-5);">Close</button>
      </div>
    </div>
  </main>
</div>

<script src="../js/admin.js"></script>
<script>
  const STATUS_OPTIONS = ['pending', 'confirmed', 'shipped', 'completed', 'cancelled'];
  let orders = [];

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function renderOrders() {
    const body = document.getElementById('orders-body');
    if (orders.length === 0) {
      body.innerHTML = '<tr><td colspan="6" style="color: var(--text-muted);">No orders yet.</td></tr>';
      return;
    }
    body.innerHTML = orders.map((o) => `
      <tr>
        <td><a href="#" data-view-order="${o.id}" style="text-decoration:underline;">${escapeHtml(o.order_number)}</a></td>
        <td>${new Date(o.created_at).toLocaleDateString('en-PK', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
        <td>${escapeHtml(o.customer_name)}<br><span style="color:var(--text-muted); font-size:12px;">${escapeHtml(o.customer_phone)}</span></td>
        <td>${o.payment_method === 'bank_transfer' ? 'Bank Transfer' : 'COD'}</td>
        <td>${window.CTAdmin.formatPkr(o.subtotal_pkr)}</td>
        <td>
          <select data-status-select="${o.id}" class="status-pill status-${o.status}" style="border:none; cursor:pointer;">
            ${STATUS_OPTIONS.map((s) => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </td>
      </tr>
    `).join('');

    body.querySelectorAll('[data-view-order]').forEach((link) => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        viewOrder(Number(link.dataset.viewOrder));
      });
    });

    body.querySelectorAll('[data-status-select]').forEach((select) => {
      select.addEventListener('change', async () => {
        const id = Number(select.dataset.statusSelect);
        const newStatus = select.value;
        select.className = 'status-pill status-' + newStatus;
        try {
          const r = await fetch(`/api/admin/orders?id=${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus }),
          });
          if (!r.ok) throw new Error();
        } catch {
          showError('Failed to update order status.');
        }
      });
    });
  }

  async function viewOrder(id) {
    const r = await fetch(`/api/admin/orders?id=${id}`);
    if (!r.ok) return showError('Failed to load order.');
    const { order, items } = await r.json();
    const itemRows = items.map((it) => `
      <tr>
        <td>${escapeHtml(it.product_name)}</td>
        <td style="text-align:center;">${it.quantity}</td>
        <td style="text-align:right;">${window.CTAdmin.formatPkr(it.unit_price_pkr)}</td>
        <td style="text-align:right;">${window.CTAdmin.formatPkr(it.line_total_pkr)}</td>
      </tr>
    `).join('');

    document.getElementById('order-detail-content').innerHTML = `
      <h2 style="font: var(--text-h2); margin:0 0 var(--space-2);">${escapeHtml(order.order_number)}</h2>
      <p style="color:var(--text-muted); margin:0 0 var(--space-4);">${new Date(order.created_at).toLocaleString('en-PK')}</p>
      <table class="admin-table" style="margin-bottom: var(--space-5);">
        <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
      <p><strong>Total: ${window.CTAdmin.formatPkr(order.subtotal_pkr)}</strong></p>
      <p><strong>Customer:</strong> ${escapeHtml(order.customer_name)}<br>
      <strong>Phone:</strong> ${escapeHtml(order.customer_phone)}<br>
      <strong>Address:</strong> ${escapeHtml(order.customer_address)}</p>
      <p><strong>Payment:</strong> ${order.payment_method === 'bank_transfer' ? 'Bank Transfer' : 'Cash on Delivery'}</p>
      ${order.notes ? `<p><strong>Notes:</strong> ${escapeHtml(order.notes)}</p>` : ''}
    `;
    document.getElementById('order-detail-backdrop').style.display = 'flex';
  }

  document.getElementById('order-detail-close').addEventListener('click', () => {
    document.getElementById('order-detail-backdrop').style.display = 'none';
  });
  document.getElementById('order-detail-backdrop').addEventListener('click', (e) => {
    if (e.target.id === 'order-detail-backdrop') e.target.style.display = 'none';
  });

  function showError(msg) {
    const el = document.getElementById('orders-error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  fetch('/api/admin/orders')
    .then((r) => {
      if (!r.ok) throw new Error();
      return r.json();
    })
    .then((data) => {
      orders = data.orders || [];
      renderOrders();
    })
    .catch(() => showError('Failed to load orders.'));
</script>

</body>
</html>
