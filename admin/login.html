<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login — CT Artisanal Pantry</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../assets/logo/ct-monogram.png">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../site.css">
</head>
<body>

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <div style="text-align:center; margin-bottom: var(--space-6);">
      <img src="../assets/logo/ct-artisanal-pantry-logo.png" alt="CT Artisanal Pantry" style="height:64px; margin:0 auto;">
      <div class="eyebrow" style="margin-top: var(--space-3);">Admin</div>
    </div>
    <div id="login-error" class="alert alert-error" style="display:none;"></div>
    <form id="login-form" class="card card-elevated">
      <div class="form-field">
        <label for="username">Username</label>
        <input class="input" type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input class="input" type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;" id="login-btn">Log In</button>
    </form>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Logging in…';

    try {
      const r = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Login failed.');
      window.location.href = 'orders.html';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log In';
    }
  });
</script>

</body>
</html>
